<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Trip Expenses</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#4A90D9"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff;color:#1a1a1a;padding:12px;user-select:none}
    .app{max-width:440px;margin:0 auto;background:#f1f5f9;border-radius:16px;padding:12px 12px 16px;min-height:200px}

    input[type="text"],textarea{
      padding:8px 12px;border:1px solid rgba(0,0,0,0.08);border-radius:8px;font-size:14px;
      background:rgba(255,255,255,0.5);color:#1a1a1a;outline:none;font-family:inherit;
    }
    input[type="text"]:focus,textarea:focus{border-color:rgba(0,0,0,0.18)}

    .btn{
      padding:7px 14px;border:1px solid rgba(0,0,0,0.08);border-radius:8px;
      background:rgba(255,255,255,0.5);color:#444;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;
    }
    .btn:active{transform:scale(.97)}
    .btn-blue{background:#6366f1;color:#fff;border:none;border-radius:8px}
    .btn-blue:disabled{opacity:.4;cursor:default}

    .tabs{display:flex;gap:0;margin-bottom:12px;background:rgba(255,255,255,0.35);border-radius:8px;padding:3px;border:1px solid rgba(0,0,0,0.08)}
    .tab{flex:1;padding:7px 0;border:none;background:transparent;border-radius:6px;font-size:12px;
      font-weight:500;color:#94a3b8;cursor:pointer;text-align:center;transition:all .15s;text-transform:capitalize}
    .tab.active{background:#6366f1;color:#fff}

    .trip-card{
      background:rgba(255,255,255,0.45);border:1px solid rgba(0,0,0,0.08);border-radius:12px;
      padding:14px 16px;cursor:pointer;transition:border-color .15s;margin-bottom:8px;
    }
    .trip-card:hover{border-color:rgba(0,0,0,0.15)}

    .stat-box{flex:1;border-radius:10px;padding:8px 10px;min-width:0;text-align:center}
    .stat-label{font-size:9px;text-transform:uppercase;letter-spacing:.8px}
    .stat-val{font-size:14px;font-weight:500;margin-top:1px}

    .date-row{display:flex;padding:7px 10px;background:rgba(238,237,254,0.5)}
    .entry-row{display:flex;padding:4px 10px 4px 18px;font-size:13px}
    .separator{border:none;border-top:1px solid rgba(0,0,0,0.06);margin:0}

    /* CC tag */
    .cc-tag{
      font-size:9px;padding:2px 6px;border-radius:8px;background:transparent;
      border:1px solid #185FA5;color:#185FA5;font-weight:500;margin-right:4px;
      display:inline-flex;align-items:center;justify-content:center;line-height:1;vertical-align:middle;
    }
    .atm-tag{
      font-size:9px;padding:2px 6px;border-radius:8px;background:transparent;
      border:1px solid #854F0B;color:#854F0B;font-weight:500;margin-right:4px;
      display:inline-flex;align-items:center;justify-content:center;line-height:1;vertical-align:middle;
    }
    .dep-tag{
      font-size:9px;padding:2px 6px;border-radius:8px;background:transparent;
      border:1px solid #0F6E56;color:#0F6E56;font-weight:500;margin-right:4px;
      display:inline-flex;align-items:center;justify-content:center;line-height:1;vertical-align:middle;
    }

    /* Sync icon button */
    .sync-btn{
      width:32px;height:32px;border:none;background:transparent;cursor:pointer;
      display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .15s;
    }
    .sync-btn:hover{background:#f1f5f9}
    .sync-btn svg{width:18px;height:18px;color:#64748b}
    .sync-btn.spinning svg{animation:spin .8s linear infinite}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

    /* Textarea notepad */
    .notepad{
      width:100%;min-height:300px;padding:14px 16px;font-size:15px;line-height:1.75;
      font-family:'SF Mono',Menlo,Monaco,Consolas,monospace;border:1px solid rgba(0,0,0,0.08);
      border-radius:10px;background:rgba(255,255,255,0.5);color:#1a1a1a;resize:none;outline:none;
      display:block;box-sizing:border-box;overflow:hidden;
    }
    .notepad:focus{border-color:rgba(0,0,0,0.18)}

    .hint{font-size:11px;color:#94a3b8;margin-top:8px;padding:0 4px;line-height:1.6}
    .no-amount-warn{margin-top:10px;padding:8px 10px;background:#FAEEDA;border-radius:8px;font-size:11px;color:#854F0B;line-height:1.6}
  </style>
</head>
<body>
  <div class="app" id="app"></div>
  <script src="app.js"></script>
</body>
</html>
